<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a0b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="subtle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.05"/>
    </linearGradient>
    <!-- grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#a855f7" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <!-- dots pattern -->
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="2" fill="#a855f7" opacity="0.15"/>
    </pattern>
    <!-- diagonal lines -->
    <pattern id="diag" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="20" stroke="#c084fc" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <!-- radial glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- pattern layers for visual interest -->
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="600" y="0" width="600" height="630" fill="url(#diag)"/>

  <!-- center glow -->
  <ellipse cx="600" cy="315" rx="500" ry="300" fill="url(#glow)"/>

  <!-- decorative pattern blocks (left side) -->
  <rect x="60" y="160" width="120" height="120" rx="16" fill="url(#subtle)" stroke="#a855f7" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="60" y="300" width="120" height="120" rx="16" fill="url(#subtle)" stroke="#a855f7" stroke-opacity="0.15" stroke-width="1"/>
  <rect x="60" y="160" width="120" height="120" rx="16">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- small grid inside decorative block -->
  <g opacity="0.4">
    <line x1="80" y1="180" x2="80" y2="260" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="100" y1="180" x2="100" y2="260" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="120" y1="180" x2="120" y2="260" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="140" y1="180" x2="140" y2="260" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="160" y1="180" x2="160" y2="260" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="80" y1="180" x2="160" y2="180" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="80" y1="200" x2="160" y2="200" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="80" y1="220" x2="160" y2="220" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="80" y1="240" x2="160" y2="240" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="80" y1="260" x2="160" y2="260" stroke="#a855f7" stroke-width="0.5"/>
  </g>

  <!-- dots inside second block -->
  <g opacity="0.5">
    <circle cx="90" cy="330" r="3" fill="#c084fc"/>
    <circle cx="110" cy="330" r="3" fill="#c084fc"/>
    <circle cx="130" cy="330" r="3" fill="#c084fc"/>
    <circle cx="150" cy="330" r="3" fill="#c084fc"/>
    <circle cx="90" cy="350" r="3" fill="#c084fc"/>
    <circle cx="110" cy="350" r="3" fill="#c084fc"/>
    <circle cx="130" cy="350" r="3" fill="#c084fc"/>
    <circle cx="150" cy="350" r="3" fill="#c084fc"/>
    <circle cx="90" cy="370" r="3" fill="#c084fc"/>
    <circle cx="110" cy="370" r="3" fill="#c084fc"/>
    <circle cx="130" cy="370" r="3" fill="#c084fc"/>
    <circle cx="150" cy="370" r="3" fill="#c084fc"/>
    <circle cx="90" cy="390" r="3" fill="#c084fc"/>
    <circle cx="110" cy="390" r="3" fill="#c084fc"/>
    <circle cx="130" cy="390" r="3" fill="#c084fc"/>
    <circle cx="150" cy="390" r="3" fill="#c084fc"/>
  </g>

  <!-- decorative pattern blocks (right side) -->
  <rect x="1020" y="200" width="120" height="120" rx="16" fill="url(#subtle)" stroke="#a855f7" stroke-opacity="0.15" stroke-width="1"/>
  <rect x="1020" y="340" width="120" height="80" rx="12" fill="url(#subtle)" stroke="#a855f7" stroke-opacity="0.1" stroke-width="1"/>

  <!-- diagonal pattern in right block -->
  <g opacity="0.35" clip-path="inset(0)">
    <line x1="1030" y1="210" x2="1130" y2="310" stroke="#c084fc" stroke-width="0.8"/>
    <line x1="1050" y1="210" x2="1130" y2="290" stroke="#c084fc" stroke-width="0.8"/>
    <line x1="1070" y1="210" x2="1130" y2="270" stroke="#c084fc" stroke-width="0.8"/>
    <line x1="1030" y1="230" x2="1130" y2="310" stroke="#c084fc" stroke-width="0.8"/>
    <line x1="1030" y1="250" x2="1110" y2="310" stroke="#c084fc" stroke-width="0.8"/>
    <line x1="1030" y1="270" x2="1090" y2="310" stroke="#c084fc" stroke-width="0.8"/>
  </g>

  <!-- sparkle icon -->
  <g transform="translate(490, 210)">
    <path d="M12 0 L14.5 9.5 L24 12 L14.5 14.5 L12 24 L9.5 14.5 L0 12 L9.5 9.5 Z" fill="#c084fc" opacity="0.9" transform="scale(1.8)"/>
  </g>

  <!-- main title -->
  <text x="600" y="320" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="800" font-size="88" fill="white" letter-spacing="-2">Motify</text>

  <!-- subtitle -->
  <text x="600" y="380" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="400" font-size="28" fill="#a1a1aa">Background Pattern Generator</text>

  <!-- bottom tagline -->
  <text x="600" y="440" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="400" font-size="20" fill="#71717a">Pick a preset · Tweak it live · Export clean CSS</text>

  <!-- bottom border accent -->
  <rect x="480" y="470" width="240" height="3" rx="1.5" fill="url(#accent)" opacity="0.5"/>
</svg>
